<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D Image Transformer</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎭 Live2D Image Transformer</h1>
            <p class="subtitle">上传一张图片，自动生成 Live2D 可动模型</p>
        </header>

        <main>
            <!-- 上传区 -->
            <section class="upload-section" id="uploadSection">
                <div class="drop-zone" id="dropZone">
                    <div class="drop-zone-content">
                        <span class="upload-icon">📤</span>
                        <p>拖拽图片到此处，或点击上传</p>
                        <p class="hint">支持 JPG / PNG / WEBP，建议 512×512 以上</p>
                        <input type="file" id="fileInput" accept="image/*" hidden>
                        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                            选择图片
                        </button>
                    </div>
                </div>

                <div class="preview" id="preview" style="display:none">
                    <img id="previewImg" src="" alt="预览">
                    <button class="btn btn-secondary" onclick="resetUpload()">重新选择</button>
                </div>

                <div class="options" id="options" style="display:none">
                    <label>
                        纹理图集尺寸:
                        <select id="atlasSize">
                            <option value="1024">1024</option>
                            <option value="2048" selected>2048 (推荐)</option>
                            <option value="4096">4096</option>
                        </select>
                    </label>
                    <button class="btn btn-primary" onclick="startProcess()">
                        🚀 开始生成
                    </button>
                </div>
            </section>

            <!-- 进度区 -->
            <section class="progress-section" id="progressSection" style="display:none">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">处理中...</p>
            </section>

            <!-- 结果区 -->
            <section class="result-section" id="resultSection" style="display:none">
                <h2>✅ 生成完成！</h2>
                <div class="result-stats" id="resultStats"></div>
                <div class="result-layers" id="resultLayers"></div>
                <a class="btn btn-primary" id="downloadBtn" href="#">
                    📥 下载 Live2D 模型 (ZIP)
                </a>
            </section>

            <!-- 错误区 -->
            <section class="error-section" id="errorSection" style="display:none">
                <div class="error-message" id="errorMessage"></div>
                <button class="btn btn-secondary" onclick="resetAll()">重新开始</button>
            </section>
        </main>

        <footer>
            <p>Live2D Image Transformer v0.1.0 | <a href="https://github.com/AuthourAkson/Live2d-image-transformer">GitHub</a></p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
